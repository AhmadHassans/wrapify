services:
  - type: web
    name: wrapify-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: PUBLIC_URL
        sync: false
      - key: OWNER_WHATSAPP_NUMBER
        sync: false
      - key: CALLMEBOT_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: ACCOUNT_JAZZCASH_NAME
        sync: false
      - key: ACCOUNT_JAZZCASH_NUMBER
        sync: false
